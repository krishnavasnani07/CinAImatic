<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMDb Top 500 Masterpieces - CinAImatic</title>
    <link rel="stylesheet" href="/src/style.css">
    <style>
        .movie-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: linear-gradient(145deg, rgba(20,20,20,0.9) 0%, rgba(10,10,10,0.95) 100%);
        }
        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(220, 38, 38, 0.4);
            border-color: rgba(220, 38, 38, 0.6);
            z-index: 10;
        }
        .rank-badge {
            background: linear-gradient(135deg, #ef4444 0%, #991b1b 100%);
            box-shadow: 0 4px 10px rgba(220, 38, 38, 0.5);
        }
        .poster-fallback {
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="bg-[#050000] text-white font-sans overflow-x-hidden relative min-h-screen">
    <!-- Modern Grid Background -->
    <div class="fixed inset-0 z-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGcgc3Ryb2tlPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMDUpIiBmaWxsPSJub25lIj48cGF0aCBkPSJNMCAwdjYwaDYwIi8+PC9nPjwvc3ZnPg==')] pointer-events-none"></div>

    <!-- Animated Blob Backgrounds -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none flex justify-center items-center">
        <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-red-600/10 rounded-full mix-blend-screen filter blur-[100px] opacity-70 animate-blob"></div>
        <div class="absolute bottom-1/4 right-1/4 w-[600px] h-[600px] bg-red-900/20 rounded-full mix-blend-screen filter blur-[120px] opacity-70 animate-blob animation-delay-2000"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="fixed top-0 w-full z-50 backdrop-blur-xl bg-black/60 border-b border-white/10 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-red-500 to-red-800 rounded-xl flex items-center justify-center font-bold shadow-[0_0_15px_rgba(220,38,38,0.6)] text-xl">🎬</div>
                <span class="text-2xl font-black text-white tracking-widest uppercase cursor-pointer" onclick="window.location.href='./index.html'">CinAImatic</span>
            </div>
            <div class="flex gap-4">
                <button onclick="window.location.href='./index.html'" class="px-6 py-2 bg-white/5 text-gray-300 border border-white/10 rounded-lg font-bold hover:bg-white/10 hover:text-white transition-all shadow-md">
                    ← Dashboard
                </button>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <div class="relative z-10 w-full px-6 pt-32 pb-20">
        <div class="max-w-7xl mx-auto text-center mb-12 animate-fade-in-up">
            <h1 class="text-4xl md:text-6xl font-black text-white mb-6 uppercase tracking-wider drop-shadow-[0_0_20px_rgba(220,38,38,0.7)]">
                The Top <span class="text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-red-600">500</span> Masterpieces
            </h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto font-medium">
                A meticulously curated list of the greatest cinematic achievements, perfectly ranked based on our proprietary dataset analytics.
            </p>
        </div>

        <!-- Loading State -->
        <div id="loadingIndicator" class="flex flex-col items-center justify-center py-20">
            <div class="w-16 h-16 border-4 border-red-600/30 border-t-red-600 rounded-full animate-spin mb-4"></div>
            <p class="text-red-500 font-bold tracking-widest uppercase">Loading Analytics...</p>
        </div>

        <!-- Movie Grid -->
        <div id="movieGrid" class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 hidden">
            <!-- Populated by JavaScript -->
        </div>
        
    </div>

    <script>
        // A deterministic hash function to pick background colors for movies without real posters
        function getDeterministicGradient(title) {
            let hash = 0;
            for (let i = 0; i < title.length; i++) {
                hash = title.charCodeAt(i) + ((hash << 5) - hash);
            }
            const h1 = Math.abs(hash % 360);
            const h2 = (h1 + 40) % 360;
            return `linear-gradient(135deg, hsl(${h1}, 70%, 15%), hsl(${h2}, 80%, 10%))`;
        }

        // Parse CSV string into array of objects
        function parseCSV(csv) {
            const lines = csv.split('\n');
            const headers = lines[0].split(',').map(h => h.trim());
            const result = [];
            
            const titleIdx = headers.indexOf('title');
            const ratingIdx = headers.indexOf('avg_rating');
            const yearIdx = headers.indexOf('year');
            const genresIdx = headers.indexOf('genres_display');
            
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (!line) continue;
                
                let row = [];
                let inQuote = false;
                let currentValue = "";
                
                for (let j = 0; j < line.length; j++) {
                    const char = line[j];
                    if (char === '"' && line[j+1] === '"') {
                        currentValue += '"';
                        j++;
                    } else if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        row.push(currentValue);
                        currentValue = "";
                    } else {
                        currentValue += char;
                    }
                }
                row.push(currentValue);
                
                if (row.length >= Math.max(titleIdx, ratingIdx)) {
                    let fullTitle = row[titleIdx] || "Unknown Movie";
                    let cleanTitle = fullTitle.replace(/\s*\(\d{4}\)$/, '').trim();
                    // Handle articles at the end (e.g., "Matrix, The" -> "The Matrix")
                    if (cleanTitle.endsWith(', The')) cleanTitle = 'The ' + cleanTitle.slice(0, -5);
                    if (cleanTitle.endsWith(', A')) cleanTitle = 'A ' + cleanTitle.slice(0, -3);
                    if (cleanTitle.endsWith(', An')) cleanTitle = 'An ' + cleanTitle.slice(0, -4);
                    
                    result.push({
                        title: cleanTitle,
                        rating: parseFloat(row[ratingIdx]) || 0,
                        year: row[yearIdx] || "N/A",
                        genres: row[genresIdx] || "Drama",
                        original_title: fullTitle
                    });
                }
            }
            return result;
        }

        async function fetchPosterLookups() {
            const posterMap = new Map();
            try {
                // Fetch public datasets to map actual posters to titles
                const [res1, res2] = await Promise.allSettled([
                    fetch('https://raw.githubusercontent.com/erik-sytnyk/movies-list/master/db.json').then(r => r.json()),
                    fetch('https://raw.githubusercontent.com/theapache64/top250/master/top250_min.json').then(r => r.json())
                ]);

                if (res1.status === 'fulfilled' && res1.value.movies) {
                    res1.value.movies.forEach(m => {
                        if (m.posterUrl && m.title) posterMap.set(m.title.toLowerCase().trim(), m.posterUrl);
                    });
                }
                if (res2.status === 'fulfilled' && Array.isArray(res2.value)) {
                    res2.value.forEach(m => {
                        if (m.thumb_url && m.name) posterMap.set(m.name.toLowerCase().trim(), m.image_url || m.thumb_url);
                    });
                }
            } catch (e) {
                console.warn("Failed to load poster lookup databases.", e);
            }
            return posterMap;
        }

        async function loadMovies() {
            try {
                // Fetch the synthetic dataset and poster mapping concurrently
                const [datasetResponse, posterMap] = await Promise.all([
                    fetch('/movies_synthetic_dataset.csv'),
                    fetchPosterLookups()
                ]);
                
                if (!datasetResponse.ok) throw new Error("Dataset not found");
                const csvData = await datasetResponse.text();
                
                const movies = parseCSV(csvData);
                
                // Sort by rating descending, then alphabetically
                movies.sort((a, b) => {
                    if (b.rating !== a.rating) return b.rating - a.rating;
                    return a.title.localeCompare(b.title);
                });
                
                // Take top 500
                const top500 = movies.slice(0, 500);
                
                const grid = document.getElementById('movieGrid');
                const loading = document.getElementById('loadingIndicator');
                
                top500.forEach((movie, index) => {
                    const posterUrl = posterMap.get(movie.title.toLowerCase());
                    const bgStyle = getDeterministicGradient(movie.title);
                    const shortGenres = movie.genres.split(',').slice(0,2).join(', ');
                    
                    const card = document.createElement('div');
                    card.className = "movie-card rounded-2xl overflow-hidden border border-white/10 relative flex flex-col h-[320px] cursor-pointer group";
                    
                    let imageHTML = '';
                    if (posterUrl) {
                        imageHTML = `
                            <div class="h-[200px] w-full relative bg-black border-b border-white/5 overflow-hidden">
                                <img src="${posterUrl}" alt="${movie.title}" class="w-full h-full object-cover opacity-80 group-hover:opacity-100 transition-opacity duration-300" onerror="this.style.display='none'">
                                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-black/30"></div>
                            </div>
                        `;
                    } else {
                        imageHTML = `
                            <div class="h-[200px] w-full relative flex items-center justify-center p-4 text-center border-b border-white/5" style="background: ${bgStyle}">
                                <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjEiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4xKSIvPjwvc3ZnPg==')] opacity-50 mix-blend-overlay"></div>
                                <h3 class="text-2xl font-black text-white/90 uppercase tracking-widest drop-shadow-md z-10 font-serif leading-tight opacity-40 mix-blend-overlay">${movie.title.substring(0, 20)}</h3>
                            </div>
                        `;
                    }

                    card.innerHTML = `
                        <div class="absolute top-3 left-3 z-20 rank-badge text-white text-xs font-black px-3 py-1 rounded-full shadow-lg border border-red-400/50">
                            #${index + 1}
                        </div>
                        <div class="absolute top-3 right-3 z-20 bg-black/60 backdrop-blur-md text-yellow-400 text-xs font-black px-2 py-1 rounded-md border border-yellow-500/30 flex items-center gap-1">
                            ⭐ ${movie.rating.toFixed(1)}
                        </div>
                        
                        ${imageHTML}
                        
                        <!-- Details Area -->
                        <div class="p-4 flex-1 flex flex-col justify-between bg-black/40 backdrop-blur-sm z-10 relative">
                            <div class="absolute -top-6 left-0 right-0 h-6 bg-gradient-to-t from-black/60 to-transparent"></div>
                            <div>
                                <h3 class="font-bold text-base text-white leading-tight mb-1 truncate drop-shadow-md" title="${movie.title}">${movie.title}</h3>
                                <p class="text-xs text-gray-400 font-medium">${movie.year}</p>
                            </div>
                            <div class="flex flex-wrap gap-2 mt-2">
                                <span class="px-2 py-0.5 bg-red-900/30 text-red-300 text-[10px] font-bold rounded uppercase tracking-wider border border-red-500/20">${shortGenres}</span>
                            </div>
                        </div>
                    `;
                    
                    grid.appendChild(card);
                });
                
                loading.style.display = 'none';
                grid.classList.remove('hidden');
                
            } catch (error) {
                console.error("Error loading movies:", error);
                document.getElementById('loadingIndicator').innerHTML = `
                    <div class="text-red-500 mb-4 text-4xl">⚠️</div>
                    <p class="text-white font-bold">Failed to load the dataset.</p>
                    <p class="text-gray-400 text-sm mt-2">Make sure movies_synthetic_dataset.csv exists in the root.</p>
                `;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', loadMovies);
    </script>
</body>
</html>
