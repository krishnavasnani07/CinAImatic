<title>IMDb Top Films — CinAImatic</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--red:#e63946;--bg:#080a0e;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--muted:#6b7280;--sans:'Be Vietnam Pro',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:#e8eaed;font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(180,20,30,0.12),transparent),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(200,30,50,0.08),transparent);pointer-events:none;z-index:0}
nav{position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);background:rgba(8,10,14,0.85);border-bottom:1px solid var(--border);padding:16px 48px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff}
.brand-logo{width:34px;height:34px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 18px rgba(230,57,70,0.4)}
.brand-name{font-size:15px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
.brand-name span{color:var(--red)}
.back-btn{font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;transition:all .2s}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,0.2)}
.hero{position:relative;z-index:1;text-align:center;padding:64px 24px 48px}
.eyebrow{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);border:1px solid rgba(230,57,70,0.25);background:rgba(230,57,70,0.07);padding:5px 14px;border-radius:100px;margin-bottom:20px}
h1{font-size:clamp(32px,5vw,60px);font-weight:900;letter-spacing:-.03em;margin-bottom:12px}
h1 span{color:var(--red)}
.subtitle{color:var(--muted);font-size:15px;max-width:480px;margin:0 auto}
/* Filters */
.filters{position:relative;z-index:1;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;padding:0 24px 40px}
.filter-btn{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:7px 16px;border-radius:100px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
.filter-btn:hover,.filter-btn.active{border-color:rgba(230,57,70,0.5);background:rgba(230,57,70,0.1);color:#fff}
/* Grid */
.grid{position:relative;z-index:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px;max-width:1300px;margin:0 auto;padding:0 24px 80px}
.card{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);background:#0d1017;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;display:flex;flex-direction:column}
.card:hover{transform:translateY(-8px) scale(1.02);box-shadow:0 28px 60px rgba(0,0,0,0.6),0 0 30px rgba(230,57,70,0.15);border-color:rgba(230,57,70,0.4)}
.card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;transition:opacity .3s}
.card:hover .card-poster{opacity:.9}
.card-poster-fallback{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;font-size:40px;background:linear-gradient(135deg,#1a1a2e,#16213e)}
.rank{position:absolute;top:10px;left:10px;background:var(--red);color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px;box-shadow:0 0 12px rgba(230,57,70,0.5)}
.rating-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);border:1px solid rgba(251,191,36,0.35);color:#fbbf24;font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 8px;border-radius:6px}
.card-info{padding:12px;flex:1;display:flex;flex-direction:column;gap:4px;background:linear-gradient(to bottom,#0d1017,#080a0e)}
.card-title{font-size:13px;font-weight:700;color:#fff;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;gap:8px;align-items:center}
.dot{width:3px;height:3px;border-radius:50%;background:var(--muted);flex-shrink:0}
.genre-tag{font-size:9px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em;color:#e63946;background:rgba(230,57,70,0.1);border:1px solid rgba(230,57,70,0.2);padding:2px 7px;border-radius:4px;display:inline-block;margin-top:4px}
.card:hover .card-title{color:var(--red)}
.hidden{display:none!important}
</style>

let activeGenre = 'all';

function render(genre) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  const filtered = genre === 'all' ? MOVIES : MOVIES.filter(m => m.genre === genre);
  filtered.forEach(m => {
    const card = document.createElement('div');
    card.className = 'card';
    const imgSrc = TMDB + m.p;
    card.innerHTML = `
      <span class="rank">#${m.r}</span>
      <span class="rating-badge">⭐ ${m.rating.toFixed(1)}</span>
      <img class="card-poster" src="${imgSrc}" alt="${m.t}" loading="lazy"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div class="card-poster-fallback" style="display:none">🎬</div>
      <div class="card-info">
        <div class="card-title" title="${m.t}">${m.t}</div>
        <div class="card-meta">${m.y}<span class="dot"></span>${m.genre}</div>
        <span class="genre-tag">${m.genre}</span>
      </div>`;
    grid.appendChild(card);
  });
}

document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeGenre = btn.dataset.genre;
  render(activeGenre);
});

render('all');
