<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CinAImatic</title>
    <link rel="stylesheet" href="/src/style.css">
    <script defer src="/src/auth.js"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-sans">
    <!-- Background Animation -->
    <div class="fixed inset-0 z-0">
        <div class="absolute top-0 right-0 w-96 h-96 bg-red-600/10 rounded-full blur-3xl -translate-y-1/2"></div>
        <div class="absolute bottom-0 left-0 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl translate-y-1/2"></div>
    </div>

    <div class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-md">
            <!-- Logo -->
            <div class="text-center mb-12">
                <div class="flex items-center justify-center gap-2 mb-4">
                    <div class="w-10 h-10 bg-red-600 rounded-lg flex items-center justify-center text-xl">🎬</div>
                    <span class="text-2xl font-bold">CinAImatic</span>
                </div>
                <h1 class="text-3xl font-bold mb-2">Welcome Back</h1>
                <p class="text-gray-400">Sign in to your account to continue</p>
            </div>

            <!-- Login Card -->
            <div class="glass-card p-8 rounded-xl">
                <form id="loginForm">
                    <!-- Email Input -->
                    <div class="mb-6">
                        <label class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                        <div class="relative">
                            <input 
                                type="email" 
                                name="email"
                                required
                                placeholder="you@example.com"
                                class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:border-red-500 focus:outline-none text-white placeholder-gray-500 transition-colors"
                            />
                            <span class="absolute right-3 top-3 text-gray-400">✉️</span>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div class="mb-2">
                        <label class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <div class="relative">
                            <input 
                                type="password" 
                                name="password"
                                required
                                id="passwordInput"
                                placeholder="••••••••"
                                class="w-full px-4 py-3 bg-white/10 border border-white/20 rounded-lg focus:border-red-500 focus:outline-none text-white placeholder-gray-500 transition-colors"
                            />
                            <button 
                                type="button" 
                                id="togglePassword"
                                class="absolute right-3 top-3 text-gray-400 hover:text-white transition-colors"
                            >
                                👁️
                            </button>
                        </div>
                    </div>

                    <!-- Remember & Forgot -->
                    <div class="flex justify-between items-center mb-6 text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" name="remember" class="w-4 h-4 rounded border-white/20 bg-white/10 cursor-pointer">
                            <span class="text-gray-300">Remember me</span>
                        </label>
                        <a href="#" class="text-red-500 hover:text-red-400">Forgot password?</a>
                    </div>

                    <!-- Login Button -->
                    <button 
                        type="submit"
                        class="w-full px-4 py-3 bg-gradient-to-r from-red-600 to-red-700 text-white rounded-lg font-bold text-lg hover:shadow-lg hover:shadow-red-500/50 transition-all transform hover:scale-105 mb-4"
                    >
                        Sign In
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative mb-6">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-sm">
                        <span class="px-2 bg-black/50 text-gray-400">Or continue with</span>
                    </div>
                </div>

                <!-- OAuth Buttons -->
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <button class="px-4 py-2 border border-white/20 rounded-lg font-medium hover:bg-white/5 transition-colors flex items-center justify-center gap-2">
                        <span>🔗</span>
                        Google
                    </button>
                    <button class="px-4 py-2 border border-white/20 rounded-lg font-medium hover:bg-white/5 transition-colors flex items-center justify-center gap-2">
                        <span>💫</span>
                        GitHub
                    </button>
                </div>

                <!-- Signup Link -->
                <p class="text-center text-gray-400">
                    Don't have an account? 
                    <a href="/signup.html" class="text-red-500 hover:text-red-400 font-medium">Create one</a>
                </p>
            </div>

            <!-- Footer Link -->
            <div class="text-center mt-8">
                <a href="/" class="text-gray-400 hover:text-white transition-colors">← Back to Home</a>
            </div>
        </div>
    </div>
</body>
</html>
