<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CinAImatic - AI-Powered Movie Recommendations</title>
</head>
<body class="bg-[#050000] text-white font-sans overflow-x-hidden relative">
    <!-- Modern Grid Background (Moved from landing.html) -->
    <div class="fixed inset-0 z-0 bg-grid-pattern pointer-events-none"></div>

    <!-- Animated Blob Backgrounds -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none flex justify-center items-center">
        <div class="absolute top-1/4 left-1/4 w-[500px] h-[500px] bg-red-600/20 rounded-full mix-blend-screen filter blur-[100px] opacity-70 animate-blob"></div>
        <div class="absolute top-1/3 right-1/4 w-[600px] h-[600px] bg-red-900/30 rounded-full mix-blend-screen filter blur-[120px] opacity-70 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-1/4 left-1/3 w-[550px] h-[550px] bg-red-500/10 rounded-full mix-blend-screen filter blur-[100px] opacity-70 animate-blob animation-delay-4000"></div>
    </div>

    <!-- React Root -->
    <div id="root" class="relative z-10"></div>
    <script type="module" src="/src/main.jsx"></script>
</body>
</html>
